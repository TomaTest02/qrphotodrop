<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbf4e9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f4e7d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#efdcc2;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="accentGlow" cx="85%" cy="15%">
      <stop offset="0%" style="stop-color:#bc965c;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#bc965c;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)" />
  <circle cx="1100" cy="100" r="200" fill="url(#accentGlow)" />

  <!-- QR Icon (stylized) -->
  <g transform="translate(150, 80)">
    <rect width="120" height="120" fill="none" stroke="#710927" stroke-width="8" rx="12" />
    <rect x="20" y="20" width="30" height="30" fill="#710927" rx="2" />
    <rect x="70" y="20" width="30" height="30" fill="#710927" rx="2" />
    <rect x="20" y="70" width="30" height="30" fill="#710927" rx="2" />
    <circle cx="90" cy="90" r="8" fill="#bc965c" />
  </g>

  <!-- Main Content -->
  <g transform="translate(350, 150)">
    <!-- Brand Name -->
    <text x="0" y="0" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#710927" letter-spacing="-2">
      QRPhotoDrop
    </text>

    <!-- Tagline -->
    <text x="0" y="80" font-family="Segoe UI, sans-serif" font-size="28" fill="#8a7d6c" font-weight="400" letter-spacing="0.5">
      Colectează amintirile evenimentului tău
    </text>

    <!-- Features -->
    <text x="0" y="140" font-family="Segoe UI, sans-serif" font-size="18" fill="#6b6459" font-weight="400">
      • Poze și clipuri fără aplicații • Slideshow live • Stocare sigură
    </text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="600" width="1200" height="30" fill="#bc965c" opacity="0.15" />
  <text x="600" y="620" font-family="Segoe UI, sans-serif" font-size="14" fill="#a59a90" text-anchor="middle">
    qrphotodrop.com • Colectează, vizionează, păstrează
  </text>
</svg>
